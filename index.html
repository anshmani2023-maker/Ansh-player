<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ansh Player</title>

    <link rel="manifest" href="manifest.json">
    <link rel="icon" type="image/png" href="logo.png">
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <div class="sidebar">
        <h2>🎵 Ansh Player</h2>

        <p>🏠 Home</p>
        <p>🔍 Search</p>
        <p>📚 Library</p>

        <hr>

        <h3>Your Playlist</h3>

        <p onclick="playSpecificSong(0)">🎶 Kesariya</p>
        <p onclick="playSpecificSong(1)">🎶 Tum Hi Ho</p>
        <p onclick="playSpecificSong(2)">🎶 Galliyan Returns</p>
    </div>

    <div class="main">

        <img src="cover.jpg" class="cover">

        <h1 id="songTitle">Ansh Player</h1>

        <audio id="song"></audio>

        <div class="controls">
            <button onclick="prevSong()">⏮</button>
            <button onclick="playSong()">▶</button>
            <button onclick="pauseSong()">⏸</button>
            <button onclick="nextSong()">⏭</button>
        </div>

        <input type="range" id="progress" value="0">

        <div class="time">
            <span id="currentTime">0:00</span>
            <span id="duration">0:00</span>
        </div>

        <input type="range" id="volume" min="0" max="100" value="100">

    </div>

    <div class="bottom-player">

        <div class="bottom-song">
            🎵 <span id="bottomTitle">Ansh Player</span>
        </div>

        <div>
            <button onclick="prevSong()">⏮</button>
            <button onclick="playSong()">▶</button>
            <button onclick="pauseSong()">⏸</button>
            <button onclick="nextSong()">⏭</button>
        </div>

    </div>

    <script src="script.js"></script>

</body>
</html>
